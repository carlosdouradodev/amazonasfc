<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecionando…</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      params.set("route", window.location.pathname);
      window.location.replace(`/${params.toString() ? `?${params.toString()}` : ""}${window.location.hash}`);
    </script>
  </head>
  <body></body>
</html>
